name: Build and Publish Docker Images

on:
  push:
    branches:
      - main
    paths:
      - "apps/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"
      - ".dockerignore"
      - ".github/workflows/docker-images.yml"
  pull_request:
    branches:
      - main
    paths:
      - "apps/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"
      - ".dockerignore"
      - ".github/workflows/docker-images.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

permissions:
  contents: read

concurrency:
  group: sandcastle-images-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: web
            dockerfile: apps/web/Dockerfile
            image_suffix: the-sandcastle-web
            title: the-sandcastle-web
            description: Sandcastle Next.js web application
            cache_scope: sandcastle-web-image
          - name: api
            dockerfile: apps/api/Dockerfile
            image_suffix: the-sandcastle-api
            title: the-sandcastle-api
            description: Sandcastle Fastify API service
            cache_scope: sandcastle-api-image
          - name: realtime
            dockerfile: apps/realtime/Dockerfile
            image_suffix: the-sandcastle-realtime
            title: the-sandcastle-realtime
            description: Sandcastle realtime WebSocket service
            cache_scope: sandcastle-realtime-image
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image version
        id: version
        run: |
          short_sha="${GITHUB_SHA::7}"
          version_tag="v$(date -u +%Y.%m.%d)-${short_sha}"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
          echo "version_tag=${version_tag}" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image_suffix }}
          tags: |
            type=raw,value=pr-${{ github.event.pull_request.number }}
            type=raw,value=sha-${{ steps.version.outputs.short_sha }}
            type=raw,value=${{ steps.version.outputs.version_tag }}
          labels: |
            org.opencontainers.image.title=${{ matrix.title }}
            org.opencontainers.image.description=${{ matrix.description }}

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.cache_scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cache_scope }}

  build-and-push:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: web
            dockerfile: apps/web/Dockerfile
            image_suffix: the-sandcastle-web
            title: the-sandcastle-web
            description: Sandcastle Next.js web application
            cache_scope: sandcastle-web-image
          - name: api
            dockerfile: apps/api/Dockerfile
            image_suffix: the-sandcastle-api
            title: the-sandcastle-api
            description: Sandcastle Fastify API service
            cache_scope: sandcastle-api-image
          - name: realtime
            dockerfile: apps/realtime/Dockerfile
            image_suffix: the-sandcastle-realtime
            title: the-sandcastle-realtime
            description: Sandcastle realtime WebSocket service
            cache_scope: sandcastle-realtime-image
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image version
        id: version
        run: |
          short_sha="${GITHUB_SHA::7}"
          version_tag="v$(date -u +%Y.%m.%d)-${short_sha}"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
          echo "version_tag=${version_tag}" >> "$GITHUB_OUTPUT"

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image_suffix }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=sha-${{ steps.version.outputs.short_sha }}
            type=raw,value=${{ steps.version.outputs.version_tag }}
          labels: |
            org.opencontainers.image.title=${{ matrix.title }}
            org.opencontainers.image.description=${{ matrix.description }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.cache_scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cache_scope }}

  create-source-tag:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute image version
        id: version
        run: |
          short_sha="${GITHUB_SHA::7}"
          version_tag="v$(date -u +%Y.%m.%d)-${short_sha}"
          echo "version_tag=${version_tag}" >> "$GITHUB_OUTPUT"

      - name: Create source tag
        env:
          VERSION_TAG: ${{ steps.version.outputs.version_tag }}
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --tags origin "refs/tags/${VERSION_TAG}" >/dev/null 2>&1; then
            echo "Tag ${VERSION_TAG} already exists"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${VERSION_TAG}" -m "Sandcastle images ${VERSION_TAG}"
          git push origin "refs/tags/${VERSION_TAG}"

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: sandcastle
      POSTGRES_USER: sandcastle
      POSTGRES_PASSWORD: sandcastle
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
  mailpit:
    image: axllent/mailpit:v1.21
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  postgres-data:

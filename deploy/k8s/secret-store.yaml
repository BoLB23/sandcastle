apiVersion: v1
kind: ServiceAccount
metadata:
  name: sandcastle-secrets
  namespace: sandcastle
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: sandcastle-openbao
  namespace: sandcastle
spec:
  provider:
    vault:
      server: http://openbao-active.openbao.svc.cluster.local:8200
      path: secret
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: sandcastle
          serviceAccountRef:
            name: sandcastle-secrets

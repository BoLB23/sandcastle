apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sandcastle-realtime
  namespace: sandcastle
spec:
  ingressClassName: nginx
  rules:
    - host: sandcastle.lab.bolblab.org
      http:
        paths:
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: sandcastle-realtime
                port:
                  number: 4001

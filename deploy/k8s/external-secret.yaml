apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: sandcastle-secrets
  namespace: sandcastle
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: sandcastle-openbao
  target:
    name: sandcastle-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: sandcastle/app
        property: DATABASE_URL
    - secretKey: AUTH_SECRET
      remoteRef:
        key: sandcastle/app
        property: AUTH_SECRET
    - secretKey: SEED_ADMIN_EMAIL
      remoteRef:
        key: sandcastle/app
        property: SEED_ADMIN_EMAIL
    - secretKey: SEED_ADMIN_PASSWORD
      remoteRef:
        key: sandcastle/app
        property: SEED_ADMIN_PASSWORD
    - secretKey: SEED_ADMIN_NAME
      remoteRef:
        key: sandcastle/app
        property: SEED_ADMIN_NAME

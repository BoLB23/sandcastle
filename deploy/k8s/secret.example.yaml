apiVersion: v1
kind: Secret
metadata:
  name: sandcastle-secrets
  namespace: sandcastle
type: Opaque
stringData:
  DATABASE_URL: postgresql://sandcastle:replace-me@postgres-rw.postgres.svc.cluster.local:5432/sandcastle
  AUTH_SECRET: replace-with-32-plus-random-characters
  GOOGLE_CLIENT_ID: replace-me
  GOOGLE_CLIENT_SECRET: replace-me
  SEED_ADMIN_EMAIL: you@example.com
  SEED_ADMIN_PASSWORD: replace-with-12-plus-character-temporary-password
  SEED_ADMIN_NAME: Organizer
